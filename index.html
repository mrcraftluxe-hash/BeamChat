<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="beam-wrapper">
        <aside class="sidebar">
            <header class="side-header">
                <div class="menu-icon">☰</div>
                <input type="text" class="search-bar" placeholder="Поиск">
            </header>
            <div class="chat-list" id="chatList">
                </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <div class="chat-info">
                    <div class="avatar" id="currentAvatar">B</div>
                    <div>
                        <div class="chat-name" id="currentChatName">Выберите чат</div>
                        <div class="chat-status">в сети</div>
                    </div>
                </div>
                <div class="header-icons">🔍 ⋮</div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="placeholder">Выберите, кому хотели бы написать</div>
            </div>

            <footer class="input-area">
                <div class="attach-icon">📎</div>
                <input type="text" id="msgInput" placeholder="Написать сообщение...">
                <div class="emoji-icon">😊</div>
                <button id="sendBtn">➤</button>
            </footer>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
